<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartCheck - Panel de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #001f3f; color: #fff; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .admin-header { display: flex; align-items: center; height: 140px; border-bottom: 2px solid #00ffcc; padding: 10px; gap: 30px; flex-shrink: 0; }
        .logo-admin { width: 250px; height: 130px; object-fit: contain; }
        .nombre-admin { width: 1100px; height: 130px; object-fit: contain; margin-left: -10px; }
        .panel-titulo { font-family: 'Georgia', serif; font-size: 28px; color: #00ffcc; text-transform: uppercase; text-align: center; margin-left: auto; font-style: italic; }
        .salir-icon { width: 50px; cursor: pointer; margin-left: 30px; flex-shrink: 0; }
        .stats-container { display: flex; gap: 20px; margin: 15px 0; height: 100px; flex-shrink: 0; }
        .card { background: #002a54; border: 1px solid #ffcc00; padding: 15px; flex: 1; text-align: center; border-radius: 8px; }
        .card h3 { color: #ffcc00; font-size: 18px; margin: 0; }
        .card p { font-size: 42px; font-weight: bold; margin: 5px 0; }
        .main-layout { display: flex; gap: 20px; flex-grow: 1; min-height: 0; margin-bottom: 10px; }
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .btn-tab { flex-grow: 1; border: 2px solid #666; cursor: pointer; font-weight: bold; text-transform: uppercase; background: linear-gradient(135deg, #e0e0e0, #a0a0a0, #707070); color: #000; border-radius: 25px; transition: 0.3s; }
        .btn-tab.active { background: #ff9f43 !important; color: #fff; border: 2px solid #fff; }
        .viewer-box { flex-grow: 1; background: #002a54; border: 1px solid #ff9f43; border-radius: 15px; padding: 20px; overflow: auto; position: relative; }
        #canvas-container { width: 100%; height: 100%; display: none; }
        #table-wrapper { width: 100%; height: 100%; overflow: auto; }
        #user-table { width: 100%; border-collapse: collapse; }
        th { background: #003b75; padding: 15px; color: #ffcc00; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #003b75; text-align: center; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00ffcc; }
        .footer-line { border-top: 2px solid #00ffcc; text-align: center; font-size: 14px; color: #888; padding-top: 15px; flex-shrink: 0; }
    </style>
</head>
<body>
    <header class="admin-header">
        <img src="/assets/logo.png" class="logo-admin">
        <img src="/assets/2do_nombre_app.png" class="nombre-admin">
        <div class="panel-titulo">Panel de Control<br>Administrador</div>
        <img src="/assets/salir.png" class="salir-icon" onclick="window.close()">
    </header>
    
    <div class="stats-container">
        <div class="card"><h3>Usuarios</h3><p id="t-user">0</p></div>
        <div class="card"><h3>Visitas</h3><p id="t-visitas">0</p></div>
        <div class="card"><h3>Suscripción</h3><p id="t-cap">$ 0</p></div>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <button class="btn-tab active" onclick="render('tabla', this)">Listado de Usuarios</button>
            <button class="btn-tab" onclick="render('genero', this)">Población por Género</button>
            <button class="btn-tab" onclick="render('localidad', this)">Usuarios por Localidad</button>
            <button class="btn-tab" onclick="render('visitas', this)">Visitas por Género y Localidad</button>
            <button class="btn-tab" onclick="render('etario', this)">Usuarios por Rangos Etarios</button>
            <button class="btn-tab" onclick="generarInformeCorporativo()">Informe Total a la Fecha</button>
        </div>
        <div class="viewer-box" id="viewer">
            <div id="canvas-container"><canvas id="chart-canvas"></canvas></div>
            <div id="table-wrapper">
                <table id="user-table">
                    <thead>
                        <tr><th>Perfil</th><th>Nombre</th><th>Apellido</th><th>Email</th><th>Edad</th><th>Género</th><th>Provincia</th><th>Localidad</th><th>Visitas</th></tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="footer-line">Sistema de Administración SmartCheck © 2026</footer>

    <script>
        const API_URL = 'https://smartcheck-proyecto-final.onrender.com';
        let globalUsers = [], chartInstance = null;
        Chart.register(ChartDataLabels);

        async function cargarDatos() {
            try {
                // CORREGIDO: Ruta absoluta apuntando a tu endpoint de usuarios en el backend
                const res = await fetch(`${API_URL}/api/users/users/usuarios`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    globalUsers = data.usuarios.filter(u => u.nombre || u.email);
                    
                    document.getElementById('t-user').innerText = globalUsers.length;
                    document.getElementById('t-visitas').innerText = globalUsers.reduce((a,x) => a + (x.visitas || 0), 0);
                    document.getElementById('t-cap').innerText = '$ ' + globalUsers.reduce((a,x) => a + (x.montoSuscripcion || 0), 0).toLocaleString();
                    
                    if (document.getElementById('table-wrapper').style.display !== 'none') {
                        mostrarTablaBase();
                    }
                }
            } catch (error) { console.error("Error al cargar datos:", error); }
        }

        function render(tipo, btn) {
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('canvas-container').style.display = tipo === 'tabla' ? 'none' : 'block';
            document.getElementById('table-wrapper').style.display = tipo === 'tabla' ? 'block' : 'none';
            if (tipo === 'tabla') mostrarTablaBase();
        }

        function mostrarTablaBase() {
            document.getElementById('tabla-body').innerHTML = globalUsers.map(u => `
                <tr>
                    <td><img src="${u.foto || '/assets/default-avatar.png'}" class="avatar"></td>
                    <td>${u.nombre || '-'}</td>
                    <td>${u.apellido || '-'}</td>
                    <td>${u.email || '-'}</td>
                    <td>${u.edad || '-'}</td>
                    <td>${u.sexo || '-'}</td>
                    <td>${u.provincia || '-'}</td>
                    <td>${u.localidad || '-'}</td>
                    <td>${u.visitas || 0}</td>
                </tr>
            `).join('');
        }

        window.onload = () => {
            cargarDatos();
            const socket = io(API_URL);
            socket.on('actualizar_panel', () => cargarDatos());
        };
        
        function generarInformeCorporativo() { alert("Generando informe..."); }
    </script>
</body>
</html>
